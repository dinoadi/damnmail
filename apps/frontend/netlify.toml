[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/webhook/telegram"
  to = "/.netlify/functions/telegram-webhook"
  status = 200

[[redirects]]
  from = "/api/webhook/email"
  to = "/.netlify/functions/email-webhook"
  status = 200

[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/appwrite-proxy"
  status = 200

[[redirects]]
  from = "/api/proxy/*"
  to = "/.netlify/functions/appwrite-proxy"
  status = 200
